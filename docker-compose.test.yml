services:
  redis:
    image: redis:7-alpine
    container_name: oldcord-test-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 1s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: oldcord-test-postgres
    environment:
      POSTGRES_DB: oldcord_v3
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 1s
      timeout: 3s
      retries: 10
